<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>スタッフ操作</title>

  <!--
  ╔═══════════════════════════════════════════════════════════╗
  ║  セットアップ手順                                          ║
  ║                                                           ║
  ║  1. console.firebase.google.com でプロジェクトを作成       ║
  ║  2. Realtime Database を追加（テストモードで作成でOK）      ║
  ║  3. プロジェクトの設定 → firebaseConfig をコピー            ║
  ║  4. 下の firebaseConfig の中身を貼り付ける                 ║
  ║  5. bomb.html にも同じ firebaseConfig を貼り付ける          ║
  ║                                                           ║
  ║  GitHub Pages デプロイ手順                                 ║
  ║  1. GitHub で新しいリポジトリを作成                         ║
  ║  2. index.html と bomb.html をアップロード                  ║
  ║  3. Settings → Pages → Deploy from branch (main)           ║
  ║  4. スタッフ用: yoursite.github.io/repo/index.html         ║
  ║     爆弾iPad: yoursite.github.io/repo/bomb.html            ║
  ╚═══════════════════════════════════════════════════════════╝
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    /* ─── Tokens ─── */
    :root {
      --bg:     #050A05;
      --card:   #090F09;
      --bd:     #1C341C;
      --green:  #00CC44;
      --dim:    #3A5A3A;
      --mute:   #1A2A1A;
      --accent: #00FF66;
      --warn:   #FFAA00;
      --danger: #FF3333;
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', 'Courier New', monospace;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      padding: 28px 16px 52px;
    }

    /* ─── Header ─── */
    .hdr {
      width: 100%; max-width: 400px;
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px;
    }
    .hdr-line { flex: 1; height: 1px; background: var(--bd); }
    .hdr-txt  { font-size: 0.62rem; color: var(--dim); letter-spacing: 6px; white-space: nowrap; }

    /* ─── Card ─── */
    .card {
      background: var(--card);
      border: 1px solid var(--bd);
      border-radius: 10px; padding: 18px;
      width: 100%; max-width: 400px;
      margin-bottom: 12px;
    }
    .card-lbl {
      font-size: 0.58rem; color: var(--dim);
      letter-spacing: 5px; margin-bottom: 14px;
    }

    /* ─── Player grid ─── */
    .pgrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .pbtn {
      background: transparent;
      border: 1px solid var(--mute);
      color: var(--dim);
      font-family: inherit;
      padding: 13px 0 10px;
      border-radius: 7px;
      cursor: pointer; touch-action: manipulation;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      transition: all 0.14s;
    }
    .pbtn .pc { font-size: 1rem; line-height: 1; }
    .pbtn .pt { font-size: 0.6rem; color: var(--mute); transition: color 0.14s; }
    .pbtn.sel {
      background: rgba(0,204,68,0.05);
      border-color: var(--accent);
      color: var(--accent);
    }
    .pbtn.sel .pt { color: rgba(0,204,68,0.4); }
    .pbtn:not(.sel):active { background: rgba(255,255,255,0.02); }

    /* ─── BGM card ─── */
    .bgm-fname {
      font-size: 0.58rem; color: var(--dim); text-align: center;
      margin-bottom: 12px; word-break: break-all; min-height: 1.2em;
    }
    .bgm-unlock-btn {
      display: block; width: 100%; text-align: center;
      padding: 11px 0; margin-bottom: 14px;
      font-family: inherit; font-size: 0.62rem; letter-spacing: 1px;
      background: transparent; border: 1px solid var(--mute); color: var(--dim);
      border-radius: 7px; cursor: pointer; touch-action: manipulation;
      transition: all 0.14s;
    }
    .bgm-unlock-btn:active { background: rgba(255,255,255,0.03); }
    .bgm-unlock-btn.done {
      border-color: var(--accent); color: var(--accent);
    }

    .bgm-vol-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 14px;
    }
    .bgm-vol-lbl { font-size: 0.6rem; color: var(--dim); letter-spacing: 2px; white-space: nowrap; }
    .bgm-vol-row input[type="range"] { flex: 1; accent-color: var(--green); }
    .bgm-vol-val { font-size: 0.6rem; color: var(--dim); width: 3.2em; text-align: right; }

    .bgm-test-row { display: none; gap: 6px; } /* 本番では非表示（?debug=1 で表示） */
    .bgm-test-btn {
      flex: 1; padding: 9px 0;
      font-family: inherit; font-size: 0.58rem; letter-spacing: 1px;
      background: transparent; border: 1px solid var(--mute); color: var(--dim);
      border-radius: 6px; cursor: pointer; touch-action: manipulation;
      transition: all 0.14s;
    }
    .bgm-test-btn:active { background: rgba(255,255,255,0.03); color: var(--accent); }

    .bgm-warn {
      text-align: center; font-size: 0.6rem; color: var(--warn);
      letter-spacing: 1px; margin-top: 10px; min-height: 1.1em;
    }

    /* ─── Start button ─── */
    #start-btn {
      width: 100%; max-width: 400px; padding: 17px;
      font-family: inherit; font-size: 1rem; letter-spacing: 8px;
      background: rgba(0,204,68,0.05);
      border: 1px solid var(--green);
      color: var(--green);
      border-radius: 10px;
      cursor: pointer; touch-action: manipulation;
      transition: all 0.14s;
      margin-bottom: 12px;
    }
    #start-btn:disabled {
      opacity: 0.16; cursor: default;
      border-color: var(--mute); color: var(--mute);
    }
    #start-btn:not(:disabled):active {
      background: rgba(0,204,68,0.12);
      transform: scale(0.98);
    }

    /* ─── Status card ─── */
    #status-card { display: none; }
    #status-card.show { display: block; }

    .live-timer {
      font-size: 3.2rem; letter-spacing: 5px; text-align: center;
      padding: 8px 0 4px;
      color: var(--warn);
      transition: color 0.4s;
    }
    .live-timer.red   { color: var(--danger); }
    .live-timer.green { color: var(--accent); }

    .sbadge {
      text-align: center; font-size: 0.76rem; letter-spacing: 3px;
      padding: 8px 12px; border-radius: 6px; margin-top: 8px;
    }
    .b-run { color:var(--warn);   background:rgba(255,170,0,0.05);  border:1px solid rgba(255,170,0,0.18); }
    .b-chk { color:#AAAAFF;       background:rgba(100,100,255,0.05);border:1px solid rgba(100,100,255,0.18);}
    .b-suc { color:var(--accent); background:rgba(0,255,100,0.05);  border:1px solid rgba(0,255,100,0.18); }
    .b-exp { color:var(--danger); background:rgba(255,50,50,0.05);  border:1px solid rgba(255,50,50,0.18); }

    .atmp-info {
      text-align: center; font-size: 0.66rem;
      color: #FF8800; letter-spacing: 2px;
      margin-top: 6px; min-height: 1.1em;
    }

    /* ─── Reset (double-tap confirm) ─── */
    #reset-btn {
      width: 100%; margin-top: 14px; padding: 11px;
      font-family: inherit; font-size: 0.7rem; letter-spacing: 4px;
      background: transparent;
      border: 1px solid var(--mute);
      color: var(--mute);
      border-radius: 7px;
      cursor: pointer; touch-action: manipulation;
      transition: all 0.14s;
    }
    #reset-btn.confirming {
      border-color: var(--danger); color: var(--danger);
      letter-spacing: 2px;
    }
    #reset-btn:active { opacity: 0.7; }

    /* auto-reset countdown line in status card */
    .ar-info {
      text-align: center; font-size: 0.66rem;
      color: var(--accent); letter-spacing: 2px;
      margin-top: 6px; min-height: 1.1em;
    }
  </style>
</head>
<body>

<div class="hdr">
  <div class="hdr-line"></div>
  <div class="hdr-txt">STAFF CONTROL</div>
  <div class="hdr-line"></div>
</div>

<!-- Player selection -->
<div class="card">

  <div class="pgrid">

<!-- BGM settings -->

    <button class="bgm-test-btn" id="bgm-test-stop" type="button">■ 停止</button>

  <div class="bgm-warn" id="bgm-warn"></div>
</div>

<button id="start-btn" disabled>START</button>

<!-- Live status panel -->
<div class="card" id="status-card">
  <div class="card-lbl">▸ LIVE STATUS</div>
  <div class="live-timer" id="live-timer">--:--</div>
  <div class="sbadge"    id="sbadge"></div>
  <div class="atmp-info" id="atmp-info"></div>
  <div class="ar-info"   id="ar-info"></div>
  <button id="reset-btn">[ RESET ]</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// ╔════════════════════════════════════════════════════╗
// ★ Firebase Config（bomb.html と同じものを貼り付け）  ★
// ╚════════════════════════════════════════════════════╝
const firebaseConfig = {
    apiKey: "AIzaSyDlvOh0Am1vQLC4RyrOpkmseu_nx4vF0kE",
    authDomain: "countdown-a04be.firebaseapp.com",
    databaseURL: "https://countdown-a04be-default-rtdb.firebaseio.com",
    projectId: "countdown-a04be",
    storageBucket: "countdown-a04be.firebasestorage.app",
    messagingSenderId: "724179810638",
    appId: "1:724179810638:web:b09efd4bd277f03f45861f",
    measurementId: "G-T2GPLE7CQG"
  };

// Config 未設定チェック
if (firebaseConfig.apiKey === "YOUR_API_KEY") {
  document.getElementById('start-btn').disabled = true;
  document.getElementById('start-btn').textContent = "Firebase 未設定";
} else {
  firebase.initializeApp(firebaseConfig);
  const gameRef = firebase.database().ref('game');
  initStaff(gameRef);
}

function initStaff(gameRef) {

  let selPlayers = null, selTime = null;
  let currentState = 'idle', prevState = 'idle';
  let uiLocked = false;   // 進行中UIロックの二重書き込みを防ぐ
  let lastData = null;    // visibilitychange復帰時の再描画用

  // ── 自動リセット（常時ON）──
  const AR_DELAY = 15;             // 成功/爆発から何秒後に待機へ戻すか
  let arTimer = null, arCountdownInt = null;
  const arInfo = document.getElementById('ar-info');

  function cancelAutoReset() {
    if (arTimer)        { clearTimeout(arTimer);         arTimer = null; }
    if (arCountdownInt) { clearInterval(arCountdownInt); arCountdownInt = null; }
    arInfo.textContent = '';
  }
  function startAutoReset() {
    cancelAutoReset();
    let remain = AR_DELAY;
    arInfo.textContent = `自動リセットまで ${remain}秒`;
    arCountdownInt = setInterval(() => {
      remain--;
      arInfo.textContent = remain > 0 ? `自動リセットまで ${remain}秒` : '';
    }, 1000);
    arTimer = setTimeout(performReset, AR_DELAY * 1000);
  }

  // ── BGM ──
  // 6分尺のBGMを想定しつつ、実際のファイル長から自動でオフセットを算出する。
  // 「残り時間 = 0」と「曲の終わり」が揃うよう、開始位置のみを補正する。
  // iPad Safariでの音切れ対策として、再生速度(playbackRate)は一切変更しない。
  // 音量フェードのみで演出し、JSタイマーも100ms以上の間隔に抑える。
  // BGM/爆発音は同じフォルダに置いた bgm.mp3 / explosion.mp3 を自動で読み込む。
  const FADE_IN_MS      = 5000; // ゲーム開始時のフェードイン
  const DUCK_MS          = 300;  // コード確認開始時、音量を落とすのにかける時間
  const RESUME_MS        = 400;  // 誤答後、音量を元に戻すのにかける時間
  const SUCCESS_FADE_MS  = 2000; // 解除成功時のフェードアウト
  const RAMP_STEP_MS     = 100;  // 音量ランプの更新間隔（これより短い間隔にはしない）

  const bgmAudio = new Audio();
  const expAudio = new Audio();
  bgmAudio.preload = 'auto';
  expAudio.preload = 'auto';
  let bgmActiveForRun = false;
  let bgmFadeInterval = null;

  const bgmFname     = document.getElementById('bgm-fname');
  const bgmVolSlider  = document.getElementById('bgm-vol');
  const bgmVolVal     = document.getElementById('bgm-vol-val');
  const bgmWarn       = document.getElementById('bgm-warn');

  // テスト用ボタンは誤操作防止のため本番では非表示（?debug=1 で表示）
  if (new URLSearchParams(location.search).get('debug') === '1') {
    document.getElementById('bgm-test-row').style.display = 'flex';
  }

  // iOS Safari対策：爆発音(expAudio)は一度もplay()されていない状態だと、
  // ゲーム進行中に自動的に呼んでも再生がブロックされる（Androidでは発生しない）。
  // ユーザー操作の中でミュート再生→即停止する「アンロック」を行い、
  // 以後その要素だけは自動再生が許可されるようにする。
  function unlockAudioElement(audio, label) {
    if (!audio.src) return;
    const prevVolume = audio.volume;
    audio.volume = 0;
    Promise.resolve(audio.play()).then(() => {
      audio.pause();
      audio.currentTime = 0;
      audio.volume = prevVolume;
    }).catch(err => {
      audio.volume = prevVolume;
      console.warn(`[BGM] ${label} unlock failed:`, err && err.name || err);
    });
  }
  function unlockAllAudio() {
    unlockAudioElement(bgmAudio, 'bgmAudio');
    unlockAudioElement(expAudio, 'expAudio');
  }
  // 画面のどこを触っても自動でアンロックを試みる（保険）
  document.addEventListener('pointerdown', unlockAllAudio, { once: true, passive: true });
  // 明示的に「有効化した」と分かるボタン（本番でも常時表示・各端末で最初に1回）
  const unlockBtn = document.getElementById('bgm-unlock-btn');
  unlockBtn.addEventListener('click', () => {
    unlockAllAudio();
    unlockBtn.textContent = '🔊 有効になりました';
    unlockBtn.classList.add('done');
  });

  function currentVolume() { return bgmVolSlider.value / 100; }
  bgmAudio.volume = currentVolume();
  expAudio.volume = currentVolume();

  bgmVolSlider.addEventListener('input', () => {
    bgmVolVal.textContent = bgmVolSlider.value + '%';
    if (!bgmFadeInterval) bgmAudio.volume = currentVolume();
    expAudio.volume = currentVolume();
  });

  function bgmDuration() {
    return isFinite(bgmAudio.duration) ? bgmAudio.duration : 0;
  }
  function checkBgmLength() {
    const maxTime = 360; // 1人プレイ（6:00）が最長
    const dur = bgmDuration();
    if (dur && dur < maxTime) {
      const m = Math.floor(dur / 60), sec = Math.floor(dur % 60);
      bgmWarn.textContent =
        `⚠ BGMが${m}:${String(sec).padStart(2,'0')}と短いため、長い制限時間では最後まで再生できません`;
    } else {
      bgmWarn.textContent = '';
    }
  }

  bgmAudio.src = 'bgm.mp3';
  expAudio.src = 'explosion.mp3';
  bgmAudio.addEventListener('loadedmetadata', () => {
    checkBgmLength();
    bgmFname.textContent = '🎵 BGM 読み込み完了';
  }, { once: true });
  bgmAudio.addEventListener('error', () => {
    bgmFname.textContent = '⚠ bgm.mp3 が見つかりません';
  }, { once: true });
  expAudio.addEventListener('error', () => {
    bgmWarn.textContent = '⚠ explosion.mp3 が見つかりません';
  }, { once: true });

  // テストボタン（各端末で一度再生しておくと、自動再生ブロックが解除される）
  document.getElementById('bgm-test-play').addEventListener('click', () => {
    if (!bgmAudio.src) return;
    bgmAudio.currentTime = 0;
    bgmAudio.play().catch(err => console.warn('[BGM] test bgmAudio play() failed:', err));
  });
  document.getElementById('bgm-test-exp').addEventListener('click', () => {
    if (!expAudio.src) return;
    expAudio.currentTime = 0;
    expAudio.play().catch(err => console.warn('[BGM] test expAudio play() failed:', err));
  });
  document.getElementById('bgm-test-stop').addEventListener('click', () => {
    bgmAudio.pause();
    expAudio.pause();
  });

  function stopFade() {
    if (bgmFadeInterval) { clearInterval(bgmFadeInterval); bgmFadeInterval = null; }
  }

  // 音量だけを目標値まで滑らかに変化させる（playbackRateは一切操作しない）。
  // 更新間隔は RAMP_STEP_MS（100ms）以上にして、iPad Safariでの負荷を抑える。
  function rampTo(targetVol, durationMs, onDone) {
    stopFade();
    const startVol = bgmAudio.volume;
    const steps = Math.max(2, Math.round(durationMs / RAMP_STEP_MS));
    let i = 0;
    bgmFadeInterval = setInterval(() => {
      i++;
      const t = Math.min(1, i / steps);
      bgmAudio.volume = startVol + (targetVol - startVol) * t;
      if (i >= steps) {
        clearInterval(bgmFadeInterval);
        bgmFadeInterval = null;
        bgmAudio.volume = targetVol;
        if (onDone) onDone();
      }
    }, durationMs / steps);
  }

  // 制限時間の残り分だけ、曲の終わりから逆算した位置で再生開始し、
  // 約5秒かけて音量をフェードイン（currentTimeを動かすのはここだけ＝ゲーム開始時の一度きり）
  function startBgmAt(remainingTime) {
    if (!bgmAudio.src) return;
    stopFade();
    bgmAudio.currentTime = Math.max(0, bgmDuration() - remainingTime);
    bgmAudio.volume = 0;
    bgmAudio.play().catch(err => {
      console.warn('[BGM] bgmAudio play() failed:', err && err.name || err);
      bgmWarn.textContent = '⚠ 自動再生がブロックされました。「音声を有効化」ボタンを押してください';
    });
    rampTo(currentVolume(), FADE_IN_MS);
  }

  // コード確認開始：音量を落としてから一時停止
  function duckForChecking() {
    rampTo(0, DUCK_MS, () => bgmAudio.pause());
  }

  // 誤答で running に戻る瞬間：無音・一時停止の間に「残り時間 = 曲の終わりまでの
  // 位置」へ巻き戻し（＝タイマーの+10秒とBGMの位置を一致させる一度きりの操作）、
  // 音量だけを滑らかに戻しながら再開する
  function resumeFromChecking(remainingTime) {
    if (!bgmAudio.src) return;
    stopFade();
    bgmAudio.currentTime = Math.max(0, bgmDuration() - remainingTime);
    bgmAudio.volume = 0;
    bgmAudio.play().catch(err => console.warn('[BGM] resume play() failed:', err && err.name || err));
    rampTo(currentVolume(), RESUME_MS);
  }

  function stopBgmImmediate() {
    stopFade();
    bgmAudio.pause();
    bgmAudio.currentTime = 0;
  }
  function fadeOutOnSuccess() {
    rampTo(0, SUCCESS_FADE_MS, () => {
      bgmAudio.pause();
      bgmAudio.currentTime = 0;
    });
  }
  function playExplosion() {
    if (!expAudio.src) return;
    expAudio.currentTime = 0;
    expAudio.play().catch(err => {
      console.warn('[BGM] 爆発音 play() failed:', err && err.name || err);
      bgmWarn.textContent = '⚠ 爆発音の再生がブロックされました。事前に「音声を有効化」を押してください';
      // iOS Safariでの一時的な失敗に備えて少し遅らせて再試行
      setTimeout(() => {
        expAudio.play().catch(err2 =>
          console.warn('[BGM] 爆発音 再試行も失敗:', err2 && err2.name || err2));
      }, 150);
    });
  }

  // 待機状態へ戻す（手動リセット2回目・自動リセットで共通）
  function performReset() {
    cancelAutoReset();
    stopBgmImmediate();
    bgmActiveForRun = false;
    uiLocked = false;
    gameRef.set({ state: 'idle' });
    document.getElementById('start-btn').disabled = true;
    document.getElementById('status-card').classList.remove('show');
    document.querySelectorAll('.pbtn').forEach(b => {
      b.classList.remove('sel');
      b.style.opacity = '1';
    });
    selPlayers = null; selTime = null;
  }

  // ── Player buttons ──
  document.querySelectorAll('.pbtn').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.pbtn').forEach(x => x.classList.remove('sel'));
      b.classList.add('sel');
      selPlayers = +b.dataset.p;
      selTime    = +b.dataset.t;
      document.getElementById('start-btn').disabled = false;
    });
  });

  // ── Start ──
  document.getElementById('start-btn').addEventListener('click', () => {
    if (!selTime) return;
    unlockAllAudio(); // 念のためここでも(保険)
    gameRef.set({
      state:         'running',
      players:       selPlayers,
      timeLimit:     selTime,
      timeRemaining: selTime,
      wrongAttempts: 0
    });
    document.getElementById('start-btn').disabled = true;
    document.querySelectorAll('.pbtn').forEach(b => b.style.opacity = '0.38');
    document.getElementById('status-card').classList.add('show');
  });

  // ── Reset（2回タップで確定、3秒でキャンセル）──
  let resetPending = false;
  let resetTimer   = null;
  const resetBtn   = document.getElementById('reset-btn');

  resetBtn.addEventListener('click', () => {
    if (!resetPending) {
      // 1回目: 確認状態へ
      resetPending = true;
      resetBtn.textContent = '[ もう一度押してリセット確定 ]';
      resetBtn.classList.add('confirming');
      resetTimer = setTimeout(() => {
        resetPending = false;
        resetBtn.textContent = '[ RESET ]';
        resetBtn.classList.remove('confirming');
      }, 3000);
      return;
    }
    // 2回目: 実行
    clearTimeout(resetTimer);
    resetPending = false;
    resetBtn.textContent = '[ RESET ]';
    resetBtn.classList.remove('confirming');
    performReset();
  });

  // 残り時間・ミス表示・タイマー色のみを描画する（DOM書き込みを最小限に）。
  // 非表示タブでは呼ばれない。タブ復帰時に visibilitychange から呼び直す。
  function renderVisuals(d) {
    const timerEl = document.getElementById('live-timer');
    const s = Math.max(0, Math.floor(d.timeRemaining || 0));
    timerEl.textContent =
      String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    timerEl.className = 'live-timer';
    if (d.state === 'running'   && s <= 30) timerEl.classList.add('red');
    if (d.state === 'success')              timerEl.classList.add('green');
    if (d.state === 'explosion')            timerEl.classList.add('red');
    document.getElementById('atmp-info').textContent = d.wrongAttempts > 0
      ? `⚠  ミス ${d.wrongAttempts}回目`
      : '';
  }
  // タブが非表示の間は描画を止めてCPU負荷を抑え、復帰した瞬間に最新状態で描画し直す
  // （BGMの再生・同期はこれとは独立して常に継続する）
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && lastData && lastData.state !== 'idle') {
      renderVisuals(lastData);
    }
  });

  // ── Firebase → status panel ──
  gameRef.on('value', snap => {
    const d = snap.val();
    if (!d || d.state === 'idle') {
      currentState = 'idle'; prevState = 'idle';
      uiLocked = false;
      lastData = null;
      cancelAutoReset();
      stopBgmImmediate();
      bgmActiveForRun = false;
      // 待機状態へ：操作を戻す(どの経路でリセットされても追従)
      document.getElementById('status-card').classList.remove('show');
      document.getElementById('start-btn').disabled = (selTime == null);
      document.querySelectorAll('.pbtn').forEach(b => b.style.opacity = '1');
      return;
    }

    currentState = d.state;
    lastData = d;

    // 進行中UIロックへの切り替えは最初の1回だけ(毎秒のDOM書き込みを避ける)
    if (!uiLocked) {
      document.getElementById('status-card').classList.add('show');
      document.getElementById('start-btn').disabled = true;
      document.querySelectorAll('.pbtn').forEach(b => b.style.opacity = '0.38');
      uiLocked = true;
    }

    if (!document.hidden) renderVisuals(d);

    // バッジ表示は状態が変わった時だけ更新
    if (d.state !== prevState) {
      const badgeEl = document.getElementById('sbadge');
      badgeEl.className = 'sbadge';
      switch (d.state) {
        case 'running':
          badgeEl.classList.add('b-run');
          badgeEl.textContent = '▶  ゲーム進行中';
          break;
        case 'checking':
          badgeEl.classList.add('b-chk');
          badgeEl.textContent = '⟳  コード確認中...';
          break;
        case 'success':
          badgeEl.classList.add('b-suc');
          badgeEl.textContent = '✓  解除成功！';
          break;
        case 'explosion':
          badgeEl.classList.add('b-exp');
          badgeEl.textContent = '💥  爆発！';
          break;
      }
    }

    // ── BGM制御(画面の表示状態に関わらず常に実行) ──
    if (d.state === 'running') {
      if (!bgmActiveForRun) {
        startBgmAt(d.timeRemaining ?? d.timeLimit);
        bgmActiveForRun = true;
      } else if (prevState === 'checking') {
        resumeFromChecking(d.timeRemaining);
      }
    } else if (d.state === 'checking') {
      if (bgmActiveForRun) duckForChecking();
    }

    // 終了（成功/爆発）へ切り替わった瞬間に自動リセットを予約（常時ON）
    const justEnded = (d.state === 'success' || d.state === 'explosion')
                   && prevState !== 'success' && prevState !== 'explosion';
    if (justEnded) {
      startAutoReset();
      if (d.state === 'success') {
        if (bgmActiveForRun) fadeOutOnSuccess();
      } else if (d.state === 'explosion') {
        stopBgmImmediate();
        playExplosion();
      }
      bgmActiveForRun = false;
    }
    if (d.state === 'running' || d.state === 'checking') cancelAutoReset();

    prevState = d.state;
  });

} // end initStaff
</script>
</body>
</html>
