<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>BOMB DEFUSAL</title>

  <!--
  ╔══════════════════════════════════════════════════════════╗
  ║  セットアップ手順                                         ║
  ║                                                          ║
  ║  1. console.firebase.google.com でプロジェクトを作成      ║
  ║  2. Realtime Database を追加（テストモードで作成でOK）     ║
  ║  3. プロジェクトの設定 → firebaseConfig をコピー           ║
  ║  4. 下の firebaseConfig の中身を貼り付ける                ║
  ║  5. SECRET_CODE を解除コードに書き換える                  ║
  ║     （文化祭前日夜に書き換えてアップロードするだけでOK）   ║
  ║  6. index.html にも同じ firebaseConfig を貼り付ける       ║
  ║                                                          ║
  ║  Firebase Database ルール（テスト用）                     ║
  ║  {                                                       ║
  ║    "rules": { ".read": true, ".write": true }            ║
  ║  }                                                       ║
  ╚══════════════════════════════════════════════════════════╝
  -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">

  <style>
    /* ─── Tokens ─── */
    :root {
      --red:    #FF2222;
      --red-bg: #0D0000;
      --red-bd: #550000;
      --green:  #00FF88;
      --orange: #FF8800;
      --ent-bg: #002800;
      --ent-bd: #007A40;
      --ent-tx: #00DD66;
    }

    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none; -webkit-user-select: none;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden; background: #000;
      font-family: 'Share Tech Mono', 'Courier New', monospace;
    }

    /* ─── Portrait block ─── */
    #rotate-screen {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: #000;
      flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
    }
    #rotate-screen .icon  { font-size: 14vw; animation: rotHint 2s ease-in-out infinite; }
    #rotate-screen .label { font-size: 5vw; color: #FF3333; letter-spacing: 3px; }
    #rotate-screen .sub   { font-size: 2.5vw; color: #333; }
    @keyframes rotHint { 0%,100%{transform:rotate(0deg)} 50%{transform:rotate(90deg)} }

    @media (orientation: portrait) {
      #rotate-screen { display: flex; }
      #game-root, #ambient-glow { display: none; }
    }

    /* ─── Ambient glow ─── */
    /* Signature element: red vignette pulses faster as time runs out */
    #ambient-glow {
      position: fixed; inset: 0; z-index: 5; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 28%, rgba(200,0,0,0.55) 100%);
      opacity: 0; transition: opacity 0.8s;
    }
    #ambient-glow.warn   { opacity: 1; animation: gPulse 2s ease-in-out infinite; }
    #ambient-glow.danger { opacity: 1; animation: gPulse 0.35s ease-in-out infinite; }
    @keyframes gPulse { 0%,100%{opacity:0.4} 50%{opacity:1} }

    /* ─── Game root ─── */
    #game-root {
      display: flex; flex-direction: column;
      width: 100vw; height: 100vh;
      background: #000;
    }

    /* ─── Timer ─── */
    #timer-wrap {
      flex: 0 0 auto;
      display: flex; align-items: flex-end; justify-content: center;
      padding: 1.8vh 0 0.6vh;
    }
    #timer {
      font-family: 'VT323', monospace;
      font-size: clamp(72px, 22vh, 160px);
      line-height: 1; letter-spacing: 0.04em;
      color: var(--red);
      text-shadow: 0 0 14px rgba(255,0,0,0.9), 0 0 50px rgba(255,0,0,0.25);
      transition: color 0.3s, text-shadow 0.3s;
    }
    #timer.blink { animation: tBlink 0.45s step-end infinite; }
    #timer.green {
      color: var(--green);
      text-shadow: 0 0 14px rgba(0,255,136,0.9), 0 0 50px rgba(0,255,136,0.25);
    }
    @keyframes tBlink { 0%,100%{opacity:1} 50%{opacity:0.18} }

    /* ─── Code display ─── */
    #code-wrap {
      flex: 0 0 auto;
      display: flex; align-items: center; justify-content: center;
      gap: clamp(10px, 2.5vw, 22px);
      padding: 0.6vh 0;
    }
    .dbox {
      width:  clamp(46px, 8.5vw, 80px);
      height: clamp(52px,  9.5vh, 86px);
      border: 2px solid var(--red-bd);
      background: var(--red-bg);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'VT323', monospace;
      font-size: clamp(32px, 7.5vh, 62px);
      color: var(--red);
      text-shadow: 0 0 8px rgba(255,0,0,0.45);
      transition: border-color 0.12s;
    }
    .dbox.filled { border-color: var(--red); }
    .dbox.pop    { animation: dPop 0.13s ease-out; }
    @keyframes dPop { 0%{transform:scale(1.22)} 100%{transform:scale(1)} }

    /* ─── Attempts warning ─── */
    #warn-wrap {
      flex: 0 0 auto; height: 3.5vh;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(10px, 1.8vh, 15px);
      color: var(--orange); letter-spacing: 3px;
      opacity: 0; transition: opacity 0.4s;
    }
    #warn-wrap.show { opacity: 1; }

    /* ─── Numpad ─── */
    #numpad-wrap {
      flex: 1 1 auto;
      display: flex; align-items: center; justify-content: center;
      padding: 0.5vh 0 2.5vh;
    }
    #numpad {
      display: grid;
      grid-template-columns: repeat(3, clamp(62px, 15.5vw, 128px));
      grid-template-rows:    repeat(4, clamp(44px,  9.5vh,  84px));
      gap: clamp(6px, 1.2vh, 11px) clamp(8px, 1.4vw, 13px);
    }
    .kbtn {
      background: var(--red-bg);
      border: 1.5px solid var(--red-bd);
      color: #FF5555;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(20px, 4.5vh, 38px);
      font-weight: 700;
      border-radius: 7px;
      cursor: pointer; touch-action: manipulation;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.07s, border-color 0.07s, transform 0.05s;
    }
    .kbtn:active { background: #1E0000; border-color: var(--red); transform: scale(0.91); }
    .kbtn.del { font-size: clamp(16px, 3.8vh, 30px); color: #FF8888; }
    .kbtn.ent {
      background: var(--ent-bg); border-color: var(--ent-bd); color: var(--ent-tx);
      font-size: clamp(12px, 2.7vh, 22px); letter-spacing: 1px;
    }
    .kbtn.ent:active { background: #003818; border-color: var(--green); }

    /* ─── +10秒 toast ─── */
    #toast {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'VT323', monospace;
      font-size: clamp(28px, 7vh, 54px);
      color: var(--orange);
      text-shadow: 0 0 16px var(--orange);
      pointer-events: none; display: none; z-index: 50;
    }
    #toast.show { display: block; animation: toastFly 1.6s ease-out forwards; }
    @keyframes toastFly {
      0%   { opacity:1; transform:translate(-50%,-50%); }
      60%  { opacity:1; transform:translate(-50%,-68%); }
      100% { opacity:0; transform:translate(-50%,-80%); }
    }

    /* ─── Overlays base ─── */
    .ov {
      position: fixed; inset: 0; z-index: 100;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ov.show { display: flex; }

    /* standby */
    #ov-standby { background: #000; }
    .sb-txt {
      font-size: clamp(12px, 2.8vh, 22px);
      color: #252525; letter-spacing: 8px;
      animation: sbPulse 2.5s ease-in-out infinite;
    }
    @keyframes sbPulse { 0%,100%{opacity:0.25} 50%{opacity:0.9} }

    /* confirm */
    #ov-confirm { background: rgba(0,0,0,0.97); }
    .cfm-box {
      border: 1.5px solid var(--red); border-radius: 14px;
      padding: 3.5vh 6vw; background: #070000;
      text-align: center; max-width: 90vw;
    }
    .cfm-title {
      font-size: clamp(13px, 3vh, 24px);
      color: #FF7777; letter-spacing: 3px; margin-bottom: 2vh;
    }
    .cfm-code {
      font-family: 'VT323', monospace;
      font-size: clamp(40px, 10vh, 80px);
      color: var(--red); letter-spacing: 0.28em;
      text-shadow: 0 0 10px rgba(255,0,0,0.4);
      margin-bottom: 3.5vh;
    }
    .cfm-btns { display: flex; gap: 4vw; justify-content: center; }
    .cfm-btn {
      padding: 1.4vh 5vw;
      font-family: inherit; font-size: clamp(12px, 2.5vh, 20px);
      font-weight: 700; border-radius: 7px;
      cursor: pointer; touch-action: manipulation; letter-spacing: 2px;
      transition: all 0.09s;
    }
    .cfm-btn:active { transform: scale(0.92); }
    #btn-no  { background: #111; border: 1.5px solid #444; color: #888; }
    #btn-yes { background: var(--ent-bg); border: 1.5px solid var(--ent-bd); color: var(--ent-tx); }

    /* checking */
    #ov-checking { background: #000; }
    .chk-txt { font-size: clamp(18px, 5.5vh, 44px); color: #AAAAEE; letter-spacing: 5px; }
    #chk-dots { display: inline-block; width: 3ch; text-align: left; }

    /* success */
    #ov-success { background: #000; text-align: center; }
    .suc-main {
      font-family: 'VT323', monospace;
      font-size: clamp(34px, 11vw, 96px);
      color: var(--green); letter-spacing: 3px;
      text-shadow: 0 0 22px rgba(0,255,136,0.9), 0 0 70px rgba(0,255,136,0.3);
      animation: sucPulse 1.2s ease-in-out infinite;
    }
    .suc-sub  { font-size: clamp(11px, 2.8vh, 22px); color: #009955; letter-spacing: 8px; margin-top: 1.5vh; }
    .suc-time { font-size: clamp(10px, 2vh, 16px);   color: #006633; letter-spacing: 4px; margin-top: 2.5vh; }
    @keyframes sucPulse {
      0%,100% { text-shadow: 0 0 22px rgba(0,255,136,0.9), 0 0 70px rgba(0,255,136,0.3); }
      50%     { text-shadow: 0 0 30px rgba(0,255,136,1),   0 0 100px rgba(0,255,136,0.5); }
    }

    /* explosion */
    #ov-explosion { animation: expFlash 0.22s step-end infinite; text-align: center; }
    @keyframes expFlash { 0%,100%{background:#CC0000} 50%{background:#FF1111} }
    .exp-main {
      font-family: 'VT323', monospace;
      font-size: clamp(44px, 14vw, 120px);
      color: #FFF; letter-spacing: 4px;
      text-shadow: 0 0 24px #FF8800, 0 0 60px #FF4400;
    }
    .exp-sub { font-size: clamp(12px, 3vh, 22px); color: #FFCCCC; letter-spacing: 6px; margin-top: 2vh; }
  </style>
</head>
<body>

<!-- Portrait block -->
<div id="rotate-screen">
  <div class="icon">📱</div>
  <div class="label">横向きにしてください</div>
  <div class="sub">ROTATE DEVICE TO LANDSCAPE</div>
</div>

<!-- Ambient glow (signature element) -->
<div id="ambient-glow"></div>

<!-- ═══ MAIN GAME ═══ -->
<div id="game-root">

  <div id="timer-wrap">
    <div id="timer">--:--</div>
  </div>

  <div id="code-wrap">
    <div class="dbox" id="d0"></div>
    <div class="dbox" id="d1"></div>
    <div class="dbox" id="d2"></div>
    <div class="dbox" id="d3"></div>
  </div>

  <div id="warn-wrap">⚠&nbsp; 残り1回</div>

  <div id="numpad-wrap">
    <div id="numpad">
      <button class="kbtn" data-v="1">1</button>
      <button class="kbtn" data-v="2">2</button>
      <button class="kbtn" data-v="3">3</button>
      <button class="kbtn" data-v="4">4</button>
      <button class="kbtn" data-v="5">5</button>
      <button class="kbtn" data-v="6">6</button>
      <button class="kbtn" data-v="7">7</button>
      <button class="kbtn" data-v="8">8</button>
      <button class="kbtn" data-v="9">9</button>
      <button class="kbtn del" data-v="back">←</button>
      <button class="kbtn" data-v="0">0</button>
      <button class="kbtn ent" data-v="enter">ENT</button>
    </div>
  </div>

</div>

<!-- +10秒 toast -->
<div id="toast">＋10秒</div>

<!-- ═══ OVERLAYS ═══ -->
<div class="ov show" id="ov-standby">
  <div class="sb-txt">// STANDBY //</div>
</div>

<div class="ov" id="ov-confirm">
  <div class="cfm-box">
    <div class="cfm-title">よろしいですか？</div>
    <div class="cfm-code" id="cfm-code"></div>
    <div class="cfm-btns">
      <button class="cfm-btn" id="btn-no">← いいえ</button>
      <button class="cfm-btn" id="btn-yes">はい</button>
    </div>
  </div>
</div>

<div class="ov" id="ov-checking">
  <div class="chk-txt">CHECKING<span id="chk-dots">...</span></div>
</div>

<div class="ov" id="ov-success">
  <div class="suc-main">ACCESS GRANTED</div>
  <div class="suc-sub">// DEACTIVATED //</div>
  <div class="suc-time" id="suc-time"></div>
</div>

<div class="ov" id="ov-explosion">
  <div class="exp-main">DETONATED</div>
  <div class="exp-sub">// GAME OVER //</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
// ╔══════════════════════════════════════════════════════╗
// ★ 解除コード（前日夜にここだけ書き換えてアップロード）  ★
// ╚══════════════════════════════════════════════════════╝
const SECRET_CODE = "2714";

// ╔══════════════════════════════════════════════════════╗
// ★ Firebase Config（index.html と同じものを貼り付け）   ★
// ╚══════════════════════════════════════════════════════╝
const firebaseConfig = {
    apiKey: "AIzaSyDlvOh0Am1vQLC4RyrOpkmseu_nx4vF0kE",
    authDomain: "countdown-a04be.firebaseapp.com",
    databaseURL: "https://countdown-a04be-default-rtdb.firebaseio.com",
    projectId: "countdown-a04be",
    storageBucket: "countdown-a04be.firebasestorage.app",
    messagingSenderId: "724179810638",
    appId: "1:724179810638:web:b09efd4bd277f03f45861f",
    measurementId: "G-T2GPLE7CQG"
  };

// ── Firebase init ──
if (firebaseConfig.apiKey === "YOUR_API_KEY") {
  // Config がまだ未設定の場合のフォールバック表示
  document.getElementById('ov-standby').innerHTML =
    '<div style="color:#FF5555;font-size:clamp(11px,2vh,18px);text-align:center;padding:24px;letter-spacing:2px;line-height:2.2">' +
    '⚠ Firebase 未設定<br>bomb.html の<br>firebaseConfig を<br>設定してください</div>';
} else {
  firebase.initializeApp(firebaseConfig);
  const gameRef = firebase.database().ref('game');
  initGame(gameRef);
}

function initGame(gameRef) {

  // ──────────── State ────────────
  let gameState     = 'idle';
  let inputCode     = '';
  let wrongAttempts = 0;
  let timeRemaining = 0;
  let timerInterval = null;
  let isLocked      = false;

  // ──────────── Audio ────────────
  let audioCtx  = null;
  let alarmLoop = null;
  let dotsLoop  = null;

  function initAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function tone(freq, dur, type, vol) {
    if (!audioCtx) return;
    try {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = type || 'square';
      o.frequency.value = freq;
      g.gain.setValueAtTime(vol || 0.15, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
      o.start(audioCtx.currentTime);
      o.stop(audioCtx.currentTime + dur);
    } catch(e) {}
  }

  const sndClick   = () => tone(1400, 0.04, 'sine', 0.08);
  const sndBeep    = () => tone(880,  0.07, 'square', 0.18);
  const sndWrong   = () => tone(180,  0.35, 'sawtooth', 0.25);
  const sndSuccess = () => {
    [[523,0],[659,110],[784,220],[1047,330]].forEach(([f,t]) =>
      setTimeout(() => tone(f, 0.4, 'sine', 0.18), t));
  };

  function startAlarm() {
    let i = 0;
    alarmLoop = setInterval(() => {
      tone(i%2===0 ? 440 : 880, 0.10, 'square', 0.4);
      if (++i > 40) { clearInterval(alarmLoop); alarmLoop = null; }
    }, 80);
  }
  function stopAlarm() {
    if (alarmLoop) { clearInterval(alarmLoop); alarmLoop = null; }
  }

  // ──────────── Overlays ────────────
  const OVS = ['standby','confirm','checking','success','explosion'];

  function showOv(name) {
    OVS.forEach(n =>
      document.getElementById('ov-'+n).classList.toggle('show', n === name)
    );
    // Dots animation
    if (name === 'checking') {
      let i = 0;
      dotsLoop = setInterval(() => {
        document.getElementById('chk-dots').textContent = '.'.repeat((i%3)+1);
        i++;
      }, 300);
    } else {
      if (dotsLoop) { clearInterval(dotsLoop); dotsLoop = null; }
      document.getElementById('chk-dots').textContent = '...';
    }
  }

  // ──────────── Ambient glow ────────────
  function updateGlow() {
    const g = document.getElementById('ambient-glow');
    g.classList.remove('warn','danger');
    if      (timeRemaining <= 10) g.classList.add('danger');
    else if (timeRemaining <= 30) g.classList.add('warn');
  }
  function clearGlow() {
    document.getElementById('ambient-glow').classList.remove('warn','danger');
  }

  // ──────────── Timer ────────────
  function startTimer(secs) {
    stopTimer();
    timeRemaining = secs;
    renderTimer();
    timerInterval = setInterval(tick, 1000);
  }
  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }
  function tick() {
    timeRemaining = Math.max(0, timeRemaining - 1);
    renderTimer();
    gameRef.update({ timeRemaining: Math.floor(timeRemaining) });
    updateGlow();
    if (timeRemaining <= 10 && timeRemaining > 0) {
      sndBeep();
      document.getElementById('timer').classList.add('blink');
    }
    if (timeRemaining <= 0) triggerExplosion();
  }
  function renderTimer() {
    const s = Math.max(0, Math.floor(timeRemaining));
    document.getElementById('timer').textContent =
      String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
  }

  // ──────────── Digit display ────────────
  function renderCode() {
    for (let i = 0; i < 4; i++) {
      const b = document.getElementById('d'+i);
      b.textContent = inputCode[i] || '';
      b.classList.toggle('filled', i < inputCode.length);
    }
  }
  function popDigit(i) {
    const b = document.getElementById('d'+i);
    b.classList.remove('pop');
    void b.offsetWidth; // reflow to restart animation
    b.classList.add('pop');
    setTimeout(() => b.classList.remove('pop'), 160);
  }

  // ──────────── Numpad ────────────
  document.querySelectorAll('.kbtn').forEach(btn => {
    btn.addEventListener('click', () => {
      initAudio();
      if (isLocked || gameState !== 'running') return;
      sndClick();
      onKey(btn.dataset.v);
    });
    btn.addEventListener('contextmenu', e => e.preventDefault());
  });

  function onKey(v) {
    if (v === 'back') {
      if (!inputCode.length) return;
      inputCode = inputCode.slice(0, -1);
      renderCode();
    } else if (v === 'enter') {
      if (inputCode.length === 4) doConfirm();
    } else {
      if (inputCode.length >= 4) return;
      const idx = inputCode.length;
      inputCode += v;
      renderCode();
      popDigit(idx);
      // 4桁揃ったら自動で確認画面
      if (inputCode.length === 4) setTimeout(doConfirm, 180);
    }
  }

  // ──────────── Confirm ────────────
  function doConfirm() {
    if (isLocked || gameState !== 'running' || inputCode.length !== 4) return;
    isLocked = true;
    document.getElementById('cfm-code').textContent = inputCode;
    showOv('confirm');
  }

  // いいえ → 最後の1桁を消してやり直し（auto-confirm が再発火しないよう3桁に戻す）
  document.getElementById('btn-no').addEventListener('click', () => {
    initAudio();
    inputCode = inputCode.slice(0, -1);
    renderCode();
    isLocked = false;
    showOv(null);
  });

  // はい → CHECKING
  document.getElementById('btn-yes').addEventListener('click', () => {
    initAudio();
    const snap = inputCode; // 判定用にスナップショット保存
    stopTimer();            // タイマーを止めてから判定（「残り1秒でENT」仕様対応）
    gameRef.update({ state: 'checking' });
    showOv('checking');

    setTimeout(() => {
      if (snap === SECRET_CODE) {
        doSuccess();
      } else {
        doWrong();
      }
    }, 1500);
  });

  // ──────────── Wrong attempt ────────────
  function doWrong() {
    wrongAttempts++;
    if (wrongAttempts >= 2) { triggerExplosion(); return; }

    // 1回目の失敗: +10秒追加して再開
    sndWrong();
    inputCode = '';
    renderCode();
    isLocked  = false;
    gameState = 'running';
    timeRemaining += 10;
    gameRef.update({ state: 'running', wrongAttempts, timeRemaining: Math.floor(timeRemaining) });
    showOv(null);
    startTimer(timeRemaining);

    document.getElementById('warn-wrap').classList.add('show');

    // +10秒トースト
    const t = document.getElementById('toast');
    t.classList.remove('show');
    void t.offsetWidth;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1700);
  }

  // ──────────── Success ────────────
  function doSuccess() {
    stopTimer();
    isLocked = true; gameState = 'success';
    sndSuccess();

    const s = Math.max(0, Math.floor(timeRemaining));
    document.getElementById('suc-time').textContent =
      '残り時間：' + String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
    document.getElementById('timer').classList.remove('blink');
    document.getElementById('timer').classList.add('green');
    clearGlow();
    gameRef.update({ state: 'success', timeRemaining: s });
    showOv('success');
  }

  // ──────────── Explosion ────────────
  function triggerExplosion() {
    stopTimer(); stopAlarm();
    isLocked = true; gameState = 'explosion';
    clearGlow();
    gameRef.update({ state: 'explosion', timeRemaining: 0 });
    startAlarm();
    showOv('explosion');
  }

  // ──────────── Game lifecycle ────────────
  function startGame(secs, initWrong) {
    gameState = 'running'; isLocked = false;
    wrongAttempts = initWrong || 0; inputCode = '';
    renderCode();
    document.getElementById('timer').classList.remove('blink','green');
    document.getElementById('warn-wrap').classList.toggle('show', wrongAttempts > 0);
    clearGlow();
    showOv(null);
    startTimer(secs);
  }

  function resetGame() {
    stopTimer(); stopAlarm();
    gameState = 'idle'; isLocked = false; inputCode = ''; wrongAttempts = 0;
    renderCode();
    document.getElementById('timer').textContent = '--:--';
    document.getElementById('timer').classList.remove('blink','green');
    document.getElementById('warn-wrap').classList.remove('show');
    clearGlow();
    showOv('standby');
  }

  // ──────────── Firebase listener ────────────
  gameRef.on('value', snap => {
    const d = snap.val();

    // リセット or 初回ロード（idle）
    if (!d || d.state === 'idle') {
      if (gameState !== 'idle') resetGame();
      else showOv('standby');
      return;
    }

    // 爆弾iPadは起動 or リロード時のみFirebaseと同期
    // （ゲーム中は爆弾iPadがマスター）
    if (gameState !== 'idle') return;

    switch (d.state) {
      case 'running':
        // timeRemaining を優先（リロード時のリカバリー対応）
        startGame(d.timeRemaining ?? d.timeLimit, d.wrongAttempts);
        break;
      case 'success':
        gameState = 'success'; isLocked = true;
        document.getElementById('timer').classList.add('green');
        showOv('success');
        break;
      case 'explosion':
        gameState = 'explosion'; isLocked = true;
        showOv('explosion');
        break;
    }
  });

  // 起動時
  showOv('standby');

} // end initGame
</script>
